<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnTracker</title>
    <!-- Main stylesheet for the application layout -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Site header with link back to home page -->
    <header>
        <h1><a href="{{ url_for('index') }}">LearnTracker</a></h1>
    </header>

    <!-- Main content area — overridden by child templates -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Script block — overridden by pages that need JavaScript -->
    {% block scripts %}{% endblock %}
</body>
</html>
